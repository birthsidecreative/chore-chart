<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ee;
    --card: #fff;
    --shadow: rgba(0,0,0,0.08);
    --c1: #ff6b6b; /* Child 1 */
    --c2: #4ecdc4; /* Child 2 */
    --c3: #ffe66d; /* Child 3 */
    --c4: #a29bfe; /* Child 4 */
    --done: #b2dfdb;
    --text: #2d2d2d;
    --muted: #999;
    --green: #00b894;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #ff6b6b 0%, #a29bfe 100%);
    color: white;
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 16px rgba(162,155,254,0.3);
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    letter-spacing: 0.5px;
  }
  header .date-badge {
    background: rgba(255,255,255,0.25);
    border-radius: 40px;
    padding: 6px 16px;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .header-btns { display: flex; gap: 10px; }
  .header-btns button {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    color: white;
    border-radius: 12px;
    padding: 7px 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .header-btns button:hover { background: rgba(255,255,255,0.35); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    background: #efe8df;
    overflow-x: auto;
    padding: 0 16px;
  }
  .tab {
    padding: 12px 22px;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab:hover { color: var(--text); }

  /* ── MAIN ── */
  main { padding: 20px 16px 40px; max-width: 1100px; margin: 0 auto; }

  /* ── TODAY VIEW ── */
  .today-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .child-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px var(--shadow);
    overflow: hidden;
  }
  .child-header {
    padding: 16px 18px 12px;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .child-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }
  .child-name { font-family: 'Fredoka One', cursive; font-size: 1.4rem; }
  .child-age { font-size: 0.8rem; opacity: 0.85; font-weight: 700; }

  .chore-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

  .chore-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: #f7f3ee;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .chore-item:hover { transform: scale(1.02); }
  .chore-item.done {
    background: #e8f8f5;
    opacity: 0.7;
  }
  .chore-item.done .chore-name {
    text-decoration: line-through;
    color: var(--muted);
  }
  .chore-check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2.5px solid #ccc;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .chore-item.done .chore-check {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .chore-emoji { font-size: 1.2rem; }
  .chore-name { font-weight: 700; font-size: 0.9rem; flex: 1; }

  .no-chores {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-weight: 700;
    font-size: 0.9rem;
  }

  /* ── HISTORY VIEW ── */
  .history-controls {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .history-controls label { font-weight: 800; font-size: 0.88rem; }
  .history-controls select, .history-controls input[type=date] {
    border: 2px solid #e0d8d0; border-radius: 10px;
    padding: 7px 12px; font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.85rem; outline: none;
    background: white;
  }
  .history-controls select:focus, .history-controls input:focus { border-color: #a29bfe; }

  .history-day-block { margin-bottom: 24px; }
  .history-day-heading {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .history-day-heading .day-score {
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem; font-weight: 800;
    background: #f0ebe5; border-radius: 20px;
    padding: 3px 10px; color: #777;
  }
  .history-entries { display: flex; flex-direction: column; gap: 6px; }
  .history-entry {
    display: flex; align-items: center; gap: 10px;
    background: white; border-radius: 12px;
    padding: 9px 14px;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .history-entry .h-child-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .history-entry .h-child-name { font-weight: 800; font-size: 0.88rem; width: 70px; }
  .history-entry .h-chore { font-weight: 700; font-size: 0.88rem; flex: 1; }
  .history-entry .h-time {
    font-size: 0.78rem; font-weight: 700;
    background: #e8f8f5; color: #00b894;
    border-radius: 20px; padding: 3px 10px;
  }
  .history-entry .h-missed {
    font-size: 0.78rem; font-weight: 700;
    background: #fff0f0; color: #ff6b6b;
    border-radius: 20px; padding: 3px 10px;
  }
  .history-empty {
    text-align: center; padding: 40px;
    color: var(--muted); font-weight: 700;
  }

  /* ── WEEK VIEW ── */
  .week-scroll { overflow-x: auto; }
  .week-table { border-collapse: collapse; width: 100%; min-width: 600px; }
  .week-table th {
    background: #efe8df;
    padding: 10px 14px;
    font-weight: 800;
    font-size: 0.85rem;
    text-align: left;
  }
  .week-table th.today-col { background: #ffe0e0; }
  .week-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #f0e8e0;
    vertical-align: top;
  }
  .week-chore-pill {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    margin: 2px;
    color: white;
  }
  .week-chore-pill.done { opacity: 0.45; text-decoration: line-through; }
  .child-label {
    display: flex; align-items: center; gap: 8px;
    font-weight: 800; font-size: 0.9rem;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ── SETTINGS VIEW ── */
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 640px) { .settings-grid { grid-template-columns: 1fr; } }

  .settings-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .settings-section h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    margin-bottom: 14px;
  }

  .setting-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #f5f0eb;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-row label { font-weight: 700; font-size: 0.9rem; flex: 1; }
  .setting-row input[type=text], .setting-row input[type=number], .setting-row select {
    border: 2px solid #e0d8d0;
    border-radius: 10px;
    padding: 6px 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    width: 130px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setting-row input:focus, .setting-row select:focus { border-color: #a29bfe; }

  .chore-mgmt { display: flex; flex-direction: column; gap: 8px; }
  .chore-row {
    display: flex; align-items: center; gap: 8px;
    background: #f7f3ee;
    border-radius: 12px;
    padding: 8px 12px;
  }
  .chore-row span { flex: 1; font-weight: 700; font-size: 0.88rem; }
  .chore-row .emoji-label { font-size: 1.1rem; }
  .chore-row .min-age-badge {
    font-size: 0.72rem;
    background: #e0d8d0;
    border-radius: 20px;
    padding: 2px 8px;
    font-weight: 800;
    color: #777;
  }
  .btn-del {
    background: none; border: none; cursor: pointer;
    color: #ff6b6b; font-size: 1.1rem; padding: 2px 4px;
    font-weight: 900;
  }
  .btn-edit {
    background: none; border: none; cursor: pointer;
    color: #a29bfe; font-size: 1rem; padding: 2px 6px;
    font-weight: 900;
  }
  .btn-add {
    display: flex; align-items: center; gap: 8px;
    background: #f7f3ee;
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 8px 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.88rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-add:hover { border-color: #a29bfe; color: #a29bfe; }

  .save-banner {
    background: #fff8e1; border: 2px solid #ffe082;
    border-radius: 14px; padding: 14px 18px;
    margin-bottom: 20px; font-size: 0.88rem; font-weight: 700;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .save-banner .save-icon { font-size: 1.4rem; }
  .save-banner p { flex: 1; color: #795548; line-height: 1.4; }
  .save-banner .save-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-export {
    background: #6c5ce7; color: white; border: none;
    border-radius: 10px; padding: 8px 16px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 0.82rem; cursor: pointer;
  }
  .btn-import {
    background: white; color: #6c5ce7;
    border: 2px solid #6c5ce7;
    border-radius: 10px; padding: 8px 16px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 0.82rem; cursor: pointer;
  }
  .day-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .day-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid #e0d8d0;
    background: white; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.72rem; cursor: pointer;
    transition: all 0.15s; color: #999;
  }
  .day-btn.selected { background: #a29bfe; border-color: #a29bfe; color: white; }
  .day-hint { font-size: 0.75rem; color: #bbb; margin-top: 4px; font-weight: 700; }
  .rotation-opt {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 2.5px solid #e0d8d0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .rotation-opt.selected { border-color: #a29bfe; background: #f3f0ff; }
  .rotation-opt input[type=radio] { margin-top: 2px; accent-color: #a29bfe; }
  .rotation-opt-label { font-weight: 800; font-size: 0.88rem; }
  .rotation-opt-desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .btn-save {
    background: linear-gradient(135deg, #a29bfe, #6c5ce7);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 12px 28px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 16px;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white;
    border-radius: 20px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: translateY(20px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-family: 'Fredoka One', cursive; font-size: 1.5rem; margin-bottom: 16px; }
  .modal .form-field { margin-bottom: 12px; }
  .modal .form-field label { display: block; font-weight: 800; font-size: 0.85rem; margin-bottom: 4px; }
  .modal .form-field input, .modal .form-field select {
    width: 100%;
    border: 2px solid #e0d8d0;
    border-radius: 10px;
    padding: 8px 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    outline: none;
  }
  .modal .form-field input:focus, .modal .form-field select:focus { border-color: #a29bfe; }
  .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
  .modal-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    border: none;
  }
  .btn-cancel { background: #f0ebe5; color: var(--text); }
  .btn-confirm { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    animation: confetti-fall 1.2s ease-out forwards;
    z-index: 9999;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(200px) rotate(720deg); opacity: 0; }
  }

  .progress-bar-wrap {
    height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; margin-top: 6px;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 3px; background: white;
    transition: width 0.5s ease;
  }

  @media(max-width: 500px) {
    header h1 { font-size: 1.5rem; }
    .today-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>⭐ Chore Chart</h1>
    <div class="date-badge" id="dateBadge"></div>
  </div>
  <div class="header-btns">
    <button onclick="resetDay()">🔄 Reset Day</button>
    <button onclick="showTab('settings')">⚙️ Edit</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-today" onclick="showTab('today')">📋 Today</div>
  <div class="tab" id="tab-week" onclick="showTab('week')">📅 This Week</div>
  <div class="tab" id="tab-history" onclick="showTab('history')">📜 History</div>
  <div class="tab" id="tab-settings" onclick="showTab('settings')">⚙️ Settings</div>
</div>

<main>
  <div id="view-today"></div>
  <div id="view-week" style="display:none"></div>
  <div id="view-history" style="display:none"></div>
  <div id="view-settings" style="display:none"></div>
</main>

<!-- Add/Edit Chore Modal -->
<div class="modal-overlay" id="choreModal">
  <div class="modal">
    <h2 id="choreModalTitle">Add Chore</h2>
    <input type="hidden" id="editChoreId" value="">
    <div class="form-field">
      <label>Chore Name</label>
      <input type="text" id="newChoreName" placeholder="e.g. Wash dishes">
    </div>
    <div class="form-field">
      <label>Emoji</label>
      <input type="text" id="newChoreEmoji" placeholder="🍽️" maxlength="2">
    </div>
    <div class="form-field">
      <label>Minimum Age</label>
      <input type="number" id="newChoreMinAge" value="5" min="1" max="18">
    </div>
    <div class="form-field">
      <label>Maximum Age (leave blank = no limit)</label>
      <input type="number" id="newChoreMaxAge" placeholder="No limit" min="1" max="18">
    </div>
    <div class="form-field">
      <label>Frequency</label>
      <select id="newChoreFrequency">
        <option value="everyone">Everyone — all eligible kids, every day</option>
        <option value="daily">Rotating daily — one child per day, cycles through</option>
        <option value="weekly">Rotating weekly — one child per week, cycles through</option>
      </select>
    </div>
    <div class="form-field">
      <label>Which days? <span style="font-weight:600;color:#bbb">(leave all off = every day)</span></label>
      <div class="day-picker">
        <button type="button" class="day-btn" data-dow="0" onclick="toggleDayBtn(this)">Sun</button>
        <button type="button" class="day-btn" data-dow="1" onclick="toggleDayBtn(this)">Mon</button>
        <button type="button" class="day-btn" data-dow="2" onclick="toggleDayBtn(this)">Tue</button>
        <button type="button" class="day-btn" data-dow="3" onclick="toggleDayBtn(this)">Wed</button>
        <button type="button" class="day-btn" data-dow="4" onclick="toggleDayBtn(this)">Thu</button>
        <button type="button" class="day-btn" data-dow="5" onclick="toggleDayBtn(this)">Fri</button>
        <button type="button" class="day-btn" data-dow="6" onclick="toggleDayBtn(this)">Sat</button>
      </div>
      <div class="day-hint">No days selected = appears every day</div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeChoreModal()">Cancel</button>
      <button class="btn-confirm" id="choreModalSaveBtn" onclick="saveChore()">Add Chore</button>
    </div>
  </div>
</div>

<!-- Hidden file input for import -->
<input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importData(event)">

<script>
// ── DEFAULT STATE ──
const DEFAULT_STATE = {
  children: [
    { id: 1, name: "Alex",   age: 11, emoji: "🦁", color: "#ff6b6b" },
    { id: 2, name: "Jamie",  age:  9, emoji: "🐬", color: "#4ecdc4" },
    { id: 3, name: "Riley",  age:  7, emoji: "🦊", color: "#f9ca24" },
    { id: 4, name: "Morgan", age:  5, emoji: "🐣", color: "#a29bfe" },
  ],
  chores: [
    { id: 1, name: "Wash dishes",    emoji: "🍽️", minAge: 9,  maxAge: null, frequency: "daily"    },
    { id: 2, name: "Take out trash", emoji: "🗑️", minAge: 9,  maxAge: null, frequency: "weekly"   },
    { id: 3, name: "Vacuum",         emoji: "🧹", minAge: 9,  maxAge: null, frequency: "daily"    },
    { id: 4, name: "Set the table",  emoji: "🥄", minAge: 6,  maxAge: null, frequency: "everyone" },
    { id: 5, name: "Feed pets",      emoji: "🐾", minAge: 5,  maxAge: null, frequency: "everyone" },
    { id: 6, name: "Tidy toys",      emoji: "🧸", minAge: 4,  maxAge:  7,   frequency: "everyone" },
    { id: 7, name: "Water plants",   emoji: "🌱", minAge: 5,  maxAge: null, frequency: "weekly"   },
  ],
  rotation: "daily", // "daily" | "weekly" | "weeknum"
  completed: {}, // { "YYYY-MM-DD_childId_choreId": true }
  completedAt: {}, // { "YYYY-MM-DD_childId_choreId": "HH:MM" }
  startDate: todayStr(), // reference date for rotation
};

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

// ── LOAD / SAVE ──
function loadState() {
  try {
    const raw = localStorage.getItem("choreState");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function saveState() {
  localStorage.setItem("choreState", JSON.stringify(state));
}

let state = loadState();
// ── Ensure startDate & completedAt exist for old saves ──
if (!state.startDate) state.startDate = todayStr();
if (!state.completedAt) state.completedAt = {};

// ── ROTATION LOGIC ──
// For a given date and chore, figure out which child should do it.
// Only eligible children (age range) are in the pool.
// We rotate the pool daily, weekly, or by week-number.

function daysBetween(aStr, bStr) {
  const a = new Date(aStr + "T00:00:00");
  const b = new Date(bStr + "T00:00:00");
  return Math.round((b - a) / 86400000);
}

function daysSince(dateStr) {
  return daysBetween(dateStr, todayStr());
}

function weeksSince(dateStr) {
  return Math.floor(daysSince(dateStr) / 7);
}

function isoWeekNumber(dateStr) {
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay()+6)%7) / 7);
}

// Returns ordered list of child IDs for a chore on a given date
function eligibleChildren(chore) {
  return state.children.filter(c =>
    c.age >= chore.minAge &&
    (chore.maxAge === null || c.age <= chore.maxAge)
  );
}

// Check if a chore is scheduled on a given date (respects days-of-week filter)
function choreActiveOnDate(chore, dateStr) {
  if (!chore.days || chore.days.length === 0) return true; // no restriction = every day
  const dow = new Date(dateStr + "T00:00:00").getDay(); // 0=Sun,1=Mon,...
  return chore.days.includes(dow);
}

// Returns the single assigned child for rotating chores, or null for "everyone" chores
function assignedChildForChore(chore, dateStr) {
  if (!choreActiveOnDate(chore, dateStr)) return null;
  if (chore.frequency === "everyone") return null; // handled separately
  const pool = eligibleChildren(chore);
  if (pool.length === 0) return null;
  const freq = chore.frequency || "daily";
  let idx = 0;
  if (freq === "daily") {
    idx = daysBetween(state.startDate || dateStr, dateStr);
  } else {
    idx = Math.floor(daysBetween(state.startDate || dateStr, dateStr) / 7);
  }
  const choreIdx = state.chores.findIndex(c => c.id === chore.id);
  return pool[(idx + choreIdx) % pool.length];
}

// ── TODAY VIEW ──
function renderToday() {
  const today = todayStr();
  const el = document.getElementById("view-today");

  // Build per-child chore assignments
  const byChild = {};
  state.children.forEach(c => { byChild[c.id] = []; });

  state.chores.forEach(chore => {
    if (!choreActiveOnDate(chore, today)) return;
    if (chore.frequency === "everyone") {
      eligibleChildren(chore).forEach(child => byChild[child.id].push(chore));
    } else {
      const child = assignedChildForChore(chore, today);
      if (child) byChild[child.id].push(chore);
    }
  });

  let html = '<div class="today-grid">';
  state.children.forEach(child => {
    const chores = byChild[child.id];
    const total = chores.length;
    const done = chores.filter(ch => state.completed[`${today}_${child.id}_${ch.id}`]).length;
    const pct = total ? Math.round(done/total*100) : 0;

    html += `<div class="child-card">
      <div class="child-header" style="background:${child.color}">
        <div class="child-avatar">${child.emoji}</div>
        <div>
          <div class="child-name">${child.name}</div>
          <div class="child-age">Age ${child.age} · ${done}/${total} done</div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="chore-list">`;

    if (chores.length === 0) {
      html += `<div class="no-chores">🎉 No chores today!</div>`;
    } else {
      chores.forEach(ch => {
        const key = `${today}_${child.id}_${ch.id}`;
        const done = state.completed[key];
        const time = state.completedAt[key];
        html += `<div class="chore-item ${done?'done':''}" onclick="toggleChore('${key}','${child.id}')">
          <div class="chore-check">${done ? '✓' : ''}</div>
          <span class="chore-emoji">${ch.emoji}</span>
          <span class="chore-name">${ch.name}${done && time ? `<span style="font-size:0.72rem;font-weight:600;color:#aaa;display:block">✓ ${time}</span>` : ''}</span>
          <span style="font-size:0.68rem;font-weight:800;opacity:0.5">${ch.frequency==='everyone'?'👨‍👩‍👧‍👦':ch.frequency==='weekly'?'📅':'📋'}</span>
        </div>`;
      });
    }

    html += `</div></div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}

// ── WEEK VIEW ──
function renderWeek() {
  const el = document.getElementById("view-week");
  const today = todayStr();
  const todayD = new Date(today + "T00:00:00");
  // Find Monday of current week
  const dow = (todayD.getDay() + 6) % 7; // 0=Mon
  const monday = new Date(todayD); monday.setDate(todayD.getDate() - dow);

  const days = [];
  const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    days.push(d.toISOString().slice(0,10));
  }

  let html = '<div class="week-scroll"><table class="week-table"><thead><tr><th>Child</th>';
  days.forEach((d, i) => {
    const isToday = d === today;
    html += `<th class="${isToday?'today-col':''}">${dayNames[i]}<br><small style="font-weight:600;font-size:0.75rem">${d.slice(5)}</small></th>`;
  });
  html += '</tr></thead><tbody>';

  state.children.forEach(child => {
    html += `<tr><td><div class="child-label"><div class="dot" style="background:${child.color}"></div>${child.name}</div></td>`;
    days.forEach(d => {
      html += '<td>';
      state.chores.forEach(chore => {
        let show = false;
        if (!choreActiveOnDate(chore, d)) {
          show = false;
        } else if (chore.frequency === "everyone") {
          show = eligibleChildren(chore).some(c => c.id === child.id);
        } else {
          const assigned = assignedChildForChore(chore, d);
          show = assigned && assigned.id === child.id;
        }
        if (show) {
          const key = `${d}_${child.id}_${chore.id}`;
          const done = state.completed[key];
          html += `<span class="week-chore-pill ${done?'done':''}" style="background:${child.color}">${chore.emoji} ${chore.name}</span>`;
        }
      });
      html += '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

// ── SETTINGS VIEW ──
function renderSettings() {
  const el = document.getElementById("view-settings");

  // Children
  let childRows = state.children.map(c => `
    <div class="setting-row">
      <input type="text" value="${c.emoji}" onchange="updateChild(${c.id},'emoji',this.value)" style="width:44px;font-size:1.3rem;text-align:center;padding:4px;" maxlength="2" title="Icon/emoji">
      <input type="text" value="${c.name}" onchange="updateChild(${c.id},'name',this.value)" style="width:90px">
      <input type="number" value="${c.age}" min="1" max="18" onchange="updateChild(${c.id},'age',+this.value)" style="width:60px">
    </div>`).join('');

  // Chores
  const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let choreRows = state.chores.map(ch => {
    const dayLabel = (ch.days && ch.days.length)
      ? ch.days.sort((a,b)=>a-b).map(d => DAY_NAMES[d]).join(", ")
      : "Every day";
    return `
    <div class="chore-row">
      <span class="emoji-label">${ch.emoji}</span>
      <span>${ch.name}</span>
      <span class="min-age-badge">Age ${ch.minAge}${ch.maxAge ? '–'+ch.maxAge : '+'}</span>
      <span class="min-age-badge" style="background:${ch.frequency==='everyone'?'#ffeaa7':ch.frequency==='weekly'?'#e8f4fd':'#e8f8f5'};color:${ch.frequency==='everyone'?'#d35400':ch.frequency==='weekly'?'#2980b9':'#00b894'}">${ch.frequency==='everyone'?'👨‍👩‍👧‍👦 Everyone':ch.frequency==='weekly'?'📅 Rot. weekly':'📋 Rot. daily'}</span>
      <span class="min-age-badge" style="background:#f5f0ff;color:#6c5ce7">🗓 ${dayLabel}</span>
      <button class="btn-edit" onclick="openEditChoreModal(${ch.id})" title="Edit">✏️</button>
      <button class="btn-del" onclick="deleteChore(${ch.id})" title="Delete">✕</button>
    </div>`;
  }).join('');

  // Rotation
  const rotOpts = [
    { val:"daily",   label:"Daily rotation",      desc:"Each day, chores shift to the next eligible child." },
    { val:"weekly",  label:"Weekly rotation",      desc:"Children keep the same chores all week, then swap." },
    { val:"weeknum", label:"By calendar week #",   desc:"Rotation follows the calendar week number." },
  ];
  let rotHtml = rotOpts.map(o => `
    <div class="rotation-opt ${state.rotation===o.val?'selected':''}" onclick="setRotation('${o.val}')">
      <input type="radio" name="rot" ${state.rotation===o.val?'checked':''}>
      <div>
        <div class="rotation-opt-label">${o.label}</div>
        <div class="rotation-opt-desc">${o.desc}</div>
      </div>
    </div>`).join('');

  el.innerHTML = `
    <div class="save-banner">
      <span class="save-icon">💾</span>
      <p><strong>Keep your settings safe!</strong> This app saves to your browser automatically, but if you clear your browser or open a new device, you'll lose your data. Export a backup file to restore anytime.</p>
      <div class="save-btns">
        <button class="btn-export" onclick="exportData()">⬇ Export Backup</button>
        <button class="btn-import" onclick="document.getElementById('importFileInput').click()">⬆ Import Backup</button>
      </div>
    </div>
    <div class="settings-grid">
      <div class="settings-section">
        <h2>👧 Children</h2>
        <p style="font-size:0.8rem;color:#999;margin-bottom:10px">Edit icon, name, and age. Tap the emoji box to change their icon.</p>
        ${childRows}
      </div>
      <div class="settings-section">
        <h2>🔄 Rotation Style</h2>
        <div class="rotation-options">${rotHtml}</div>
        <p style="font-size:0.78rem;color:#aaa;margin-top:10px">Tip: "Daily" works great for quick chores like dishes. "Weekly" suits bigger tasks.</p>
      </div>
      <div class="settings-section" style="grid-column:1/-1">
        <h2>📋 Chores</h2>
        <p style="font-size:0.8rem;color:#999;margin-bottom:10px">Set min/max age so chores only appear for the right kids. Leave max blank for no upper limit.</p>
        <div class="chore-mgmt">
          ${choreRows}
          <button class="btn-add" onclick="openChoreModal()">＋ Add a chore</button>
        </div>
      </div>
    </div>
    <button class="btn-save" onclick="saveAndRefresh()">💾 Save Changes</button>
  `;
}

// ── INTERACTIONS ──
function toggleChore(key, childId) {
  const wasEmpty = !state.completed[key];
  state.completed[key] = !state.completed[key];
  if (state.completed[key]) {
    const now = new Date();
    state.completedAt[key] = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } else {
    delete state.completedAt[key];
  }
  saveState();
  renderToday();
  if (wasEmpty) spawnConfetti(childId);

  // Check if all chores done for that child today
  const today = todayStr();
  const child = state.children.find(c => c.id == childId);
  const allKeys = state.chores
    .filter(ch => { const a = assignedChildForChore(ch, today); return a && a.id == childId; })
    .map(ch => `${today}_${childId}_${ch.id}`);
  if (allKeys.length && allKeys.every(k => state.completed[k])) {
    setTimeout(() => bigConfetti(), 100);
  }
}

function updateChild(id, field, val) {
  const c = state.children.find(x => x.id === id);
  if (c) c[field] = val;
  saveState();
}

function setRotation(val) {
  state.rotation = val;
  saveState();
  renderSettings();
}

function deleteChore(id) {
  state.chores = state.chores.filter(c => c.id !== id);
  saveState();
  renderSettings();
}

function toggleDayBtn(btn) {
  btn.classList.toggle("selected");
}
function setDayBtns(days) {
  document.querySelectorAll(".day-btn").forEach(btn => {
    const dow = parseInt(btn.dataset.dow);
    btn.classList.toggle("selected", days.includes(dow));
  });
}
function getSelectedDays() {
  return Array.from(document.querySelectorAll(".day-btn.selected"))
    .map(btn => parseInt(btn.dataset.dow));
}

function openChoreModal() {
  document.getElementById("choreModalTitle").textContent = "Add Chore";
  document.getElementById("choreModalSaveBtn").textContent = "Add Chore";
  document.getElementById("editChoreId").value = "";
  document.getElementById("newChoreName").value = "";
  document.getElementById("newChoreEmoji").value = "";
  document.getElementById("newChoreMinAge").value = "5";
  document.getElementById("newChoreMaxAge").value = "";
  document.getElementById("newChoreFrequency").value = "daily";
  setDayBtns([]);
  document.getElementById("choreModal").classList.add("open");
}
function openEditChoreModal(id) {
  const ch = state.chores.find(c => c.id === id);
  if (!ch) return;
  document.getElementById("choreModalTitle").textContent = "Edit Chore";
  document.getElementById("choreModalSaveBtn").textContent = "Save Changes";
  document.getElementById("editChoreId").value = id;
  document.getElementById("newChoreName").value = ch.name;
  document.getElementById("newChoreEmoji").value = ch.emoji;
  document.getElementById("newChoreMinAge").value = ch.minAge;
  document.getElementById("newChoreMaxAge").value = ch.maxAge || "";
  document.getElementById("newChoreFrequency").value = ch.frequency || "daily";
  setDayBtns(ch.days || []);
  document.getElementById("choreModal").classList.add("open");
}
function closeChoreModal() {
  document.getElementById("choreModal").classList.remove("open");
}
function saveChore() {
  const name = document.getElementById("newChoreName").value.trim();
  const emoji = document.getElementById("newChoreEmoji").value.trim() || "✅";
  const minAge = parseInt(document.getElementById("newChoreMinAge").value) || 5;
  const maxAgeRaw = document.getElementById("newChoreMaxAge").value.trim();
  const maxAge = maxAgeRaw ? parseInt(maxAgeRaw) : null;
  const frequency = document.getElementById("newChoreFrequency").value || "daily";
  const days = getSelectedDays();
  if (!name) return;
  const editId = document.getElementById("editChoreId").value;
  if (editId) {
    const ch = state.chores.find(c => c.id == editId);
    if (ch) { ch.name = name; ch.emoji = emoji; ch.minAge = minAge; ch.maxAge = maxAge; ch.frequency = frequency; ch.days = days; }
  } else {
    const newId = Math.max(0, ...state.chores.map(c=>c.id)) + 1;
    state.chores.push({ id: newId, name, emoji, minAge, maxAge, frequency, days });
  }
  saveState();
  closeChoreModal();
  renderSettings();
}

// ── EXPORT / IMPORT ──
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `chore-chart-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.children || !imported.chores) throw new Error("Invalid file");
      Object.assign(state, imported);
      if (!state.completedAt) state.completedAt = {};
      saveState();
      renderAll();
      renderSettings();
      alert("✅ Backup imported successfully!");
    } catch(err) {
      alert("❌ Couldn't read that file. Make sure it's a chore chart backup.");
    }
  };
  reader.readAsText(file);
  event.target.value = ""; // reset so same file can be re-imported
}

function saveAndRefresh() {
  saveState();
  renderAll();
  showTab('today');
}

function resetDay() {
  const today = todayStr();
  Object.keys(state.completed).forEach(k => {
    if (k.startsWith(today)) delete state.completed[k];
  });
  saveState();
  renderToday();
}

// ── CONFETTI ──
function spawnConfetti(childId) {
  const child = state.children.find(c => c.id == childId);
  const color = child ? child.color : "#a29bfe";
  for (let i = 0; i < 8; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.cssText = `
      left: ${30 + Math.random()*40}%;
      top: ${20 + Math.random()*40}%;
      background: ${color};
      animation-delay: ${Math.random()*0.3}s;
      transform: rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}
function bigConfetti() {
  const colors = ["#ff6b6b","#4ecdc4","#ffe66d","#a29bfe","#00b894","#fd79a8"];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*30}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay: ${Math.random()*0.6}s;
      width: ${8+Math.random()*8}px;
      height: ${8+Math.random()*8}px;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// ── HISTORY VIEW ──
let historyFilter = { child: "all", days: 7 };

function renderHistory() {
  const el = document.getElementById("view-history");
  const today = todayStr();

  // Build date range
  const dates = [];
  for (let i = 0; i < historyFilter.days; i++) {
    const d = new Date(today + "T00:00:00");
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }

  const childOpts = state.children.map(c =>
    `<option value="${c.id}" ${historyFilter.child==c.id?'selected':''}>${c.emoji} ${c.name}</option>`
  ).join('');

  let html = `<div class="history-controls">
    <label>Child:</label>
    <select onchange="historyFilter.child=this.value;renderHistory()">
      <option value="all" ${historyFilter.child==='all'?'selected':''}>All children</option>
      ${childOpts}
    </select>
    <label>Show:</label>
    <select onchange="historyFilter.days=+this.value;renderHistory()">
      <option value="7" ${historyFilter.days==7?'selected':''}>Last 7 days</option>
      <option value="14" ${historyFilter.days==14?'selected':''}>Last 14 days</option>
      <option value="30" ${historyFilter.days==30?'selected':''}>Last 30 days</option>
    </select>
  </div>`;

  let anyData = false;

  dates.forEach(dateStr => {
    // Collect all assigned chores for this date
    const entries = [];
    state.children.forEach(child => {
      if (historyFilter.child !== 'all' && child.id != historyFilter.child) return;
      state.chores.forEach(chore => {
        let show = false;
        if (chore.frequency === "everyone") {
          show = eligibleChildren(chore).some(c => c.id === child.id);
        } else {
          const assigned = assignedChildForChore(chore, dateStr);
          show = assigned && assigned.id === child.id;
        }
        if (show) {
          const key = `${dateStr}_${child.id}_${chore.id}`;
          entries.push({
            child,
            chore,
            done: !!state.completed[key],
            time: state.completedAt[key] || null,
          });
        }
      });
    });

    if (entries.length === 0) return;
    anyData = true;

    const doneCount = entries.filter(e => e.done).length;
    const isToday = dateStr === today;
    const dateLabel = isToday ? "Today" : new Date(dateStr + "T12:00:00").toLocaleDateString(undefined, { weekday:"long", month:"short", day:"numeric" });

    html += `<div class="history-day-block">
      <div class="history-day-heading">
        ${dateLabel}
        <span class="day-score">${doneCount}/${entries.length} done</span>
      </div>
      <div class="history-entries">`;

    entries.forEach(e => {
      const timeTag = e.done
        ? `<span class="h-time">✓ ${e.time || 'done'}</span>`
        : (isToday ? '' : `<span class="h-missed">✗ missed</span>`);
      html += `<div class="history-entry">
        <div class="h-child-dot" style="background:${e.child.color}"></div>
        <span class="h-child-name">${e.child.name}</span>
        <span class="h-chore">${e.chore.emoji} ${e.chore.name}</span>
        ${timeTag}
      </div>`;
    });

    html += `</div></div>`;
  });

  if (!anyData) {
    html += `<div class="history-empty">No chore history yet — check off some chores to see them here! 🌟</div>`;
  }

  el.innerHTML = html;
}

// ── TAB SWITCHING ──
function showTab(name) {
  ["today","week","history","settings"].forEach(t => {
    document.getElementById(`view-${t}`).style.display = t===name ? "" : "none";
    document.getElementById(`tab-${t}`).classList.toggle("active", t===name);
  });
  if (name === "today") renderToday();
  if (name === "week") renderWeek();
  if (name === "history") renderHistory();
  if (name === "settings") renderSettings();
}

function renderAll() {
  renderToday();
}

// ── DATE DISPLAY ──
function updateDate() {
  const d = new Date();
  const opts = { weekday:"long", month:"long", day:"numeric" };
  document.getElementById("dateBadge").textContent = d.toLocaleDateString(undefined, opts);
}

// ── INIT ──
updateDate();
renderAll();
</script>
